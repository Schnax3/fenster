<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vorhang Pro Planer | Deluxe Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="brand">
            <h1>Vorhang Planer</h1>
            <span>Raumdesign Studio</span>
        </div>

        <div class="scroll-area">
            <div class="section">
                <p class="section-title">Konfiguration</p>
                <div class="field">
                    <label>Anzahl & Position</label>
                    <select id="curtainMode">
                        <option value="2">Paar (Links & Rechts)</option>
                        <option value="1L">Einzelvorhang (Links)</option>
                        <option value="1R">Einzelvorhang (Rechts)</option>
                    </select>
                </div>
            </div>

            <div class="section">
                <p class="section-title">Maße (cm)</p>
                <div class="row-2">
                    <div class="field">
                        <label>Breite Links</label>
                        <input type="number" id="curWLeft" value="80">
                    </div>
                    <div class="field">
                        <label>Breite Rechts</label>
                        <input type="number" id="curWRight" value="80">
                    </div>
                </div>
                <div class="field">
                    <label>Vorhang Länge (Höhe)</label>
                    <input type="number" id="curH" value="240">
                </div>
                <div class="row-2" style="background: rgba(0,0,0,0.03); padding: 10px; border-radius: 8px;">
                    <div class="field">
                        <label>Fenster B</label>
                        <input type="number" id="winW" value="160">
                    </div>
                    <div class="field">
                        <label>Fenster H</label>
                        <input type="number" id="winH" value="200">
                    </div>
                </div>
            </div>

            <div class="section">
                <p class="section-title">Stil & Farbe</p>
                <div class="field">
                    <label>Falten-Intensität: <span id="foldVal">35%</span></label>
                    <input type="range" id="foldRange" min="5" max="80" value="35">
                </div>
                <div class="field">
                    <label>Hauptfarbe</label>
                    <div class="color-row">
                        <input type="color" id="colorPicker" value="#8B6B4E">
                        <input type="text" id="colorHex" value="#8B6B4E" placeholder="#hex">
                    </div>
                </div>
            </div>

            <div class="section">
                <p class="section-title">Material-Textur</p>
                <div class="pattern-grid" id="patternGrid">
                    <button class="pattern-btn active" data-pattern="solid">Glatte Seide</button>
                    <button class="pattern-btn" data-pattern="stripes-v">Nadelstreifen</button>
                    <button class="pattern-btn" data-pattern="check">Modernes Karo</button>
                    <button class="pattern-btn" data-pattern="linen">Natur Leinen</button>
                </div>
            </div>
        </div>

        <div class="sidebar-footer">
            <button class="btn-primary" id="exportBtn">Planung als Bild speichern</button>
            <button class="btn-secondary" onclick="location.reload()">Alles Zurücksetzen</button>
        </div>
    </aside>

    <main class="preview-area">
        <div class="canvas-viewport">
            <div class="room-scene" id="roomScene">
                <div class="wall">
                    <div class="header-rod" id="headerRod"></div>
                    <div class="window-frame-outer" id="windowFrame">
                        <div class="window-bg"></div>
                        <div class="window-divider-h"></div>
                        <div class="window-divider-v"></div>
                        <div class="curtain-canvas-wrap">
                            <canvas id="curtainCanvas"></canvas>
                        </div>
                    </div>
                </div>
                <div class="floor"></div>
            </div>
        </div>
        
        <div class="floating-badge">
            <span id="labelW">160</span> x <span id="labelH">200</span> cm Fenstermaße
        </div>
    </main>
</div>

<script src="index.js"></script>
</body>
</html>
