<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorhang Planer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Vorhang Planer</h1>
  <span>Raumdesign Studio</span>
</header>

<div class="app">
  <aside class="sidebar">

    <div class="section">
      <p class="section-title">Fenstermaße</p>
      <div class="row-2">
        <div class="field">
          <label for="winW">Breite (cm)</label>
          <input type="number" id="winW" value="140" min="20" max="600">
        </div>
        <div class="field">
          <label for="winH">Höhe (cm)</label>
          <input type="number" id="winH" value="220" min="20" max="400">
        </div>
      </div>
    </div>

    <div class="section">
      <p class="section-title">Vorhangmaße</p>
      <div class="row-2">
        <div class="field">
          <label for="curW">Breite je Seite (cm)</label>
          <input type="number" id="curW" value="90" min="10" max="400">
        </div>
        <div class="field">
          <label for="curH">Länge (cm)</label>
          <input type="number" id="curH" value="240" min="30" max="500">
        </div>
      </div>
      <div class="field">
        <label>Faltenwurf</label>
        <div class="fold-control">
          <input type="range" id="foldRange" min="0" max="60" value="25">
          <span class="fold-val" id="foldVal">25%</span>
        </div>
      </div>
      <div class="field">
        <label for="styleSelect">Stilvariante</label>
        <select id="styleSelect">
          <option value="wave">Wellenfalte</option>
          <option value="pencil">Bleistiftfalte</option>
          <option value="eyelet">Ösenvorhang</option>
          <option value="panel">Schiebepaneele</option>
        </select>
      </div>
    </div>

    <div class="section">
      <p class="section-title">Farbe & Stoff</p>
      <div class="field">
        <label>Hauptfarbe</label>
        <div class="color-row">
          <input type="color" id="colorPicker" value="#8B6B4E">
          <input type="text" id="colorHex" value="#8B6B4E" placeholder="#RRGGBB">
        </div>
        <div class="swatches" id="swatches">
          <div class="swatch active" style="background:#8B6B4E" data-color="#8B6B4E"></div>
          <div class="swatch" style="background:#4A6741" data-color="#4A6741"></div>
          <div class="swatch" style="background:#3A5470" data-color="#3A5470"></div>
          <div class="swatch" style="background:#8B3A3A" data-color="#8B3A3A"></div>
          <div class="swatch" style="background:#C9A882" data-color="#C9A882"></div>
          <div class="swatch" style="background:#D4C5B0" data-color="#D4C5B0"></div>
          <div class="swatch" style="background:#2C2C2C" data-color="#2C2C2C"></div>
          <div class="swatch" style="background:#F5F0E8" data-color="#F5F0E8"></div>
          <div class="swatch" style="background:#7B6B9E" data-color="#7B6B9E"></div>
          <div class="swatch" style="background:#5B8A8A" data-color="#5B8A8A"></div>
          <div class="swatch" style="background:#E8D5A0" data-color="#E8D5A0"></div>
          <div class="swatch" style="background:#C88060" data-color="#C88060"></div>
        </div>
      </div>
      <div class="field">
        <label>Zweite Farbe (Muster)</label>
        <div class="color-row">
          <input type="color" id="color2Picker" value="#F5F0E8">
          <input type="text" id="color2Hex" value="#F5F0E8" placeholder="#RRGGBB">
        </div>
      </div>
    </div>

    <div class="section">
      <p class="section-title">Muster</p>
      <div class="pattern-grid" id="patternGrid">

        <button class="pattern-btn active" data-pattern="solid">
          <svg viewBox="0 0 32 32"><rect width="32" height="32" rx="2" fill="currentColor" opacity="0.3"/></svg>
          Uni
        </button>

        <button class="pattern-btn" data-pattern="stripes-v">
          <svg viewBox="0 0 32 32">
            <rect width="6" height="32" x="0" fill="currentColor" opacity="0.5"/>
            <rect width="6" height="32" x="13" fill="currentColor" opacity="0.5"/>
            <rect width="6" height="32" x="26" fill="currentColor" opacity="0.5"/>
          </svg>
          Streifen
        </button>

        <button class="pattern-btn" data-pattern="stripes-h">
          <svg viewBox="0 0 32 32">
            <rect height="6" width="32" y="0" fill="currentColor" opacity="0.5"/>
            <rect height="6" width="32" y="13" fill="currentColor" opacity="0.5"/>
            <rect height="6" width="32" y="26" fill="currentColor" opacity="0.5"/>
          </svg>
          Querstr.
        </button>

        <button class="pattern-btn" data-pattern="check">
          <svg viewBox="0 0 32 32">
            <rect width="16" height="16" fill="currentColor" opacity="0.5"/>
            <rect width="16" height="16" x="16" y="16" fill="currentColor" opacity="0.5"/>
          </svg>
          Karo
        </button>

        <button class="pattern-btn" data-pattern="dots">
          <svg viewBox="0 0 32 32">
            <circle cx="8" cy="8" r="4" fill="currentColor" opacity="0.5"/>
            <circle cx="24" cy="8" r="4" fill="currentColor" opacity="0.5"/>
            <circle cx="8" cy="24" r="4" fill="currentColor" opacity="0.5"/>
            <circle cx="24" cy="24" r="4" fill="currentColor" opacity="0.5"/>
          </svg>
          Punkte
        </button>

        <button class="pattern-btn" data-pattern="herringbone">
          <svg viewBox="0 0 32 32">
            <path d="M0 8 L8 0 L16 8 L8 16Z" fill="currentColor" opacity="0.5"/>
            <path d="M16 8 L24 0 L32 8 L24 16Z" fill="currentColor" opacity="0.5"/>
            <path d="M0 24 L8 16 L16 24 L8 32Z" fill="currentColor" opacity="0.5"/>
            <path d="M16 24 L24 16 L32 24 L24 32Z" fill="currentColor" opacity="0.5"/>
          </svg>
          Fischgrät
        </button>

        <button class="pattern-btn" data-pattern="damask">
          <svg viewBox="0 0 32 32">
            <ellipse cx="16" cy="16" rx="8" ry="12" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
            <ellipse cx="16" cy="16" rx="12" ry="8" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
            <circle cx="16" cy="16" r="3" fill="currentColor" opacity="0.5"/>
          </svg>
          Damast
        </button>

        <button class="pattern-btn" data-pattern="linen">
          <svg viewBox="0 0 32 32">
            <line x1="0" y1="4"  x2="32" y2="4"  stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
            <line x1="0" y1="8"  x2="32" y2="8"  stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
            <line x1="0" y1="12" x2="32" y2="12" stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
            <line x1="0" y1="16" x2="32" y2="16" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
            <line x1="0" y1="20" x2="32" y2="20" stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
            <line x1="0" y1="24" x2="32" y2="24" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
            <line x1="0" y1="28" x2="32" y2="28" stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
          </svg>
          Leinen
        </button>

        <button class="pattern-btn" data-pattern="image">
          <svg viewBox="0 0 32 32">
            <rect width="30" height="30" x="1" y="1" rx="2" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
            <circle cx="10" cy="12" r="4" fill="currentColor" opacity="0.3"/>
            <path d="M1 22 L10 14 L18 20 L24 15 L31 22" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.5"/>
          </svg>
          Bild
        </button>

      </div>

      <div id="imageUploadSection" class="hidden">
        <div class="upload-zone" id="uploadZone">
          <div class="icon">🖼</div>
          <strong>Bild hochladen</strong>
          <p>JPG, PNG oder SVG</p>
        </div>
        <input type="file" id="imgUpload" accept="image/*">
      </div>
    </div>

    <div class="section">
      <button class="btn-primary" id="exportBtn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
        </svg>
        Als PNG speichern
      </button>
      <button class="btn-secondary" id="resetBtn">Zurücksetzen</button>
    </div>

  </aside>

  <main class="preview-panel">
    <div class="room-scene" id="roomScene">
      <div class="wall">
        <div class="header-rod" id="headerRod"></div>
        <div class="window-frame-outer" id="windowFrame">
          <div class="window-bg"></div>
          <div class="window-divider-h"></div>
          <div class="window-divider-v"></div>
          <div class="curtain-canvas-wrap">
            <canvas id="curtainCanvas"></canvas>
          </div>
        </div>
      </div>
      <div class="floor"></div>
    </div>
    <div class="window-label" id="windowLabel">
      <span class="dimension-badge" id="labelW">140 cm</span> breit ×
      <span class="dimension-badge" id="labelH">220 cm</span> hoch
    </div>
  </main>
</div>

<script src="index.js"></script>
</body>
</html>
